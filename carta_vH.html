<!-- 2. ESTILOS — MOBILE-FIRST                  -->
<!-- ═══════════════════════════════════════════ -->
<style>
  /* ── PALETA ── */
  :root {
    --gold: #c4a76c;
    --gold-light: #d4bc8a;
    --cream: #f0e6d3;
    --text: #e0d4c0;
    --muted: #8a7a64;
    --bg-deep: #060e1e;
    --bg-mid: #0a1628;
    --green-badge: #78b4a0;
  }

  /* ── RESET ── */
  * { margin:0; padding:0; box-sizing:border-box }

  /* ── BASE (MOBILE) ── */
  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── NOISE OVERLAY ── */
  body::after {
    content: '';
    position: fixed; inset: 0; opacity: .03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; pointer-events: none; z-index: 9999;
  }

  /* ── AMBIENT GLOWS (solo desktop, ahorra GPU en móvil) ── */
  .ambient { display: none }

  /* ── HEADER — compacto en móvil ── */
  .hero {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding: 2.5rem 1.2rem 1rem;
  }

  /* ── OCTOPUS — oculto en móvil ── */
  .octopus-bg { display: none }

  /* ── BRAND ── */
  .brand { margin-bottom: .3rem }
  .brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: 4.5rem; font-weight: 500;
    letter-spacing: .18em; color: var(--cream);
    line-height: 1;
  }
  .brand .subtitle {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300;
    font-size: 1rem; letter-spacing: .2em;
    color: var(--muted); margin-top: .4rem;
  }

  /* ── DIVIDER ── */
  .divider-wrap {
    display: flex; align-items: center; justify-content: center; gap: .8rem;
    margin: 1.2rem auto 1.5rem;
  }
  .divider-line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, rgba(196,167,108,.4), transparent) }
  .divider-diamond { width: 5px; height: 5px; border: 1px solid rgba(196,167,108,.4); transform: rotate(45deg) }

  /* ── MENÚ CONTENEDOR ── */
  .menu { position: relative; z-index: 1; max-width: 660px; width: 100%; padding: 0 1rem; margin: 0 auto }

  /* ── SECCIONES ── */
  .section { margin-bottom: 2rem }
  .section:last-child { margin-bottom: .8rem }
  .section-title {
    font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 400;
    letter-spacing: .25em; text-transform: uppercase; color: var(--gold);
    margin-bottom: 1rem; display: flex; align-items: center; gap: .8rem;
  }
  .section-title::before, .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,167,108,.18), transparent);
  }

  /* ── PLATOS ── */
  .dish {
    padding: .9rem 0;
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: .8rem; text-align: left;
    position: relative;
    transition: background .15s;
    margin: 0 -.5rem; padding-left: .5rem; padding-right: .5rem;
    border-radius: 4px;
  }
  .dish:active { background: rgba(196,167,108,.04) }
  .dish::after {
    content: ''; position: absolute; bottom: 0; left: 3%; right: 3%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,167,108,.08), transparent);
  }
  .dish:last-child::after { display: none }

  .dish-name {
    font-size: .92rem; letter-spacing: .03em; font-weight: 400;
    color: var(--text); line-height: 1.5;
  }
  .dish-desc {
    display: block; font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-weight: 300; color: var(--muted);
    font-size: .88rem; margin-top: .2rem; letter-spacing: .01em;
    line-height: 1.4;
  }
  .dish-allergens {
    display: inline-flex; gap: .3rem; margin-left: .4rem;
    font-size: .8rem; vertical-align: middle;
  }

  /* ── BADGES — legibles en móvil ── */
  .badge {
    display: inline-flex; align-items: center;
    font-family: 'Raleway', sans-serif; font-size: .6rem;
    letter-spacing: .12em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px; margin-left: .5rem;
    vertical-align: middle; font-weight: 600;
  }
  .badge.esp {
    background: rgba(196,167,108,.1); color: var(--gold);
    border: 1px solid rgba(196,167,108,.25);
  }
  .badge.new {
    background: rgba(120,180,160,.08); color: var(--green-badge);
    border: 1px solid rgba(120,180,160,.2);
  }

  /* ── LEYENDA ALÉRGENOS ── */
  .allergen-legend {
    display: flex; align-items: center; justify-content: center; gap: .4rem;
    font-family: 'Cormorant Garamond', serif; font-size: 1rem;
    color: rgba(196,167,108,.7); letter-spacing: .03em; font-weight: 300;
    margin-bottom: 1.5rem;
  }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 1; text-align: left;
    padding: .8rem 1.2rem 6rem;
    max-width: 600px; margin: 0 auto;
  }
  .footer-divider { width: 40px; height: 1px; background: rgba(196,167,108,.25); margin: 0 auto 1.5rem }

  .info-grid {
    display: flex; flex-direction: column; align-items: flex-start;
    gap: .5rem; margin-bottom: 1.5rem; padding-left: 1.5rem;
  }
  .info-item {
    display: flex; align-items: center; gap: .5rem;
    font-family: 'Cormorant Garamond', serif; font-size: 1rem;
    color: var(--muted); letter-spacing: .03em; font-weight: 300;
  }
  .info-item svg { opacity: .5; flex-shrink: 0 }
  .info-highlight { color: rgba(196,167,108,.7); font-weight: 300 }
  .info-highlight svg { opacity: .6 }

  /* ── CTA PEDIDO — touch-friendly ── */
  .order-cta {
    margin-top: 1.5rem; display: flex; justify-content: center;
  }
  .order-cta a {
    display: flex; align-items: center; justify-content: center; gap: .6rem;
    background: rgba(196,167,108,.08); border: 1px solid rgba(196,167,108,.3);
    color: var(--gold); padding: 1rem 2rem; border-radius: 4px;
    text-decoration: none; font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem; letter-spacing: .15em; text-transform: uppercase;
    font-weight: 400;
    min-height: 52px;
    transition: background .15s;
  }
  .order-cta a:active { background: rgba(196,167,108,.15) }

  .ig { margin-top: 1.5rem; text-align: center }
  .ig a {
    color: var(--muted); text-decoration: none; font-size: .8rem;
    letter-spacing: .1em; display: inline-flex; align-items: center; gap: .5rem;
    min-height: 44px;
  }
  .ig a:active { color: var(--gold-light) }

  /* ── FLOATING CTA — paella pan con whatsapp ── */
  .float-cta {
    position: fixed; bottom: 1.2rem; right: 1.2rem; z-index: 100;
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; border: none; background: none;
    bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px));
    filter: drop-shadow(0 4px 12px rgba(0,0,0,.35));
  }
  .float-cta:active { transform: scale(.93) }
  .float-cta .paella-svg { width: 100%; height: 100%; transform: rotate(-45deg) }
  .float-cta .steam {
    position: absolute; top: 2px; width: 2px; height: 10px;
    background: rgba(255,255,255,.2); border-radius: 2px;
    animation: steam 2.5s ease-in-out infinite;
  }
  .float-cta .steam:nth-child(1) { left: 20px; top: -2px; animation-delay: 0s }
  .float-cta .steam:nth-child(2) { left: 32px; top: 0px; animation-delay: .7s }
  .float-cta .steam:nth-child(3) { left: 44px; top: 4px; animation-delay: 1.4s }
  @keyframes steam {
    0% { opacity: 0; transform: translateY(0) scaleY(.5) }
    40% { opacity: .5 }
    100% { opacity: 0; transform: translateY(-14px) scaleY(1.3) }
  }

  /* ── WAVE ── */
  .wave-wrap {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
    pointer-events: none; z-index: 0; opacity: .04;
  }

  /* ═══════════════════════════════════════════ */
  /* DESKTOP ENHANCEMENTS (min-width: 600px)    */
  /* ═══════════════════════════════════════════ */
  @media (min-width: 600px) {
    .ambient { display: block; position: fixed; inset: 0; pointer-events: none; z-index: 0 }
    .ambient .g1 {
      position: absolute; width: 600px; height: 600px; top: -10%; right: -8%;
      background: radial-gradient(circle, rgba(196,167,108,.06) 0%, transparent 70%);
      animation: d1 18s ease-in-out infinite;
    }
    .ambient .g2 {
      position: absolute; width: 500px; height: 500px; bottom: 10%; left: -5%;
      background: radial-gradient(circle, rgba(30,60,120,.12) 0%, transparent 70%);
      animation: d2 22s ease-in-out infinite;
    }
    .ambient .g3 {
      position: absolute; width: 400px; height: 400px; top: 40%; left: 30%;
      background: radial-gradient(circle, rgba(196,167,108,.03) 0%, transparent 70%);
      animation: d3 15s ease-in-out infinite;
    }
    @keyframes d1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,40px)} }
    @keyframes d2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }
    @keyframes d3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-20px)} }

    .octopus-bg {
      display: block; position: absolute; bottom: -6%; right: -2%; width: 46%;
      opacity: .045; pointer-events: none;
    }
    .octopus-bg svg { width: 100%; height: auto }

    .hero {
      min-height: 100vh; justify-content: center;
      padding: 3rem 2rem;
    }

    .brand h1 { font-size: clamp(4.5rem, 11vw, 7rem); letter-spacing: .22em }
    .brand .subtitle { font-size: 1.15rem; letter-spacing: .32em }

    .divider-wrap { margin: 2rem auto 2.5rem }
    .divider-line { width: 60px }

    .menu { padding: 0 1.5rem }
    .section { margin-bottom: 3rem }
    .section:last-child { margin-bottom: 1rem }
    .section-title { font-size: 1.25rem; letter-spacing: .4em; margin-bottom: 1.4rem }

    .dish { margin: 0; padding-left: 0; padding-right: 0; border-radius: 0 }
    .dish:hover { transform: translateX(4px) }
    .dish:hover .dish-name { color: var(--cream) }

    .info-grid { flex-direction: row; flex-wrap: wrap; gap: .6rem 1.4rem; justify-content: flex-start }

    .order-cta a {
      position: relative; overflow: hidden;
      transition: all .4s cubic-bezier(.25,.46,.45,.94);
    }
    .order-cta a::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(196,167,108,.06); transform: scaleX(0);
      transform-origin: left; transition: transform .4s cubic-bezier(.25,.46,.45,.94);
    }
    .order-cta a:hover::before { transform: scaleX(1) }
    .order-cta a:hover {
      border-color: rgba(196,167,108,.5); transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(196,167,108,.12);
    }

    .ig a:hover { color: var(--gold-light); letter-spacing: .14em }

    footer { padding-bottom: 4rem }
    .wave-wrap { height: 100px; opacity: .05 }
  }
</style>
</head>

<script>
(function render() {
  const C = CONFIG;
  const waMsg = encodeURIComponent('\u00a1Hola!\nComensales: \nFecha: \nLugar: \nArroz: ');
  const waUrl = `https://wa.me/${C.contacts[0].phone}?text=${waMsg}`;

  /* Brand */
  document.getElementById('brand-name').textContent = C.brand.name;
  document.getElementById('brand-subtitle').textContent = C.brand.subtitle;

  /* Menu — SIN PRECIOS */
  const menuEl = document.getElementById('menu-container');
  C.carta.forEach(sec => {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';
    sectionEl.setAttribute('role', 'listitem');

    let html = `<div class="section-title">${sec.section}</div>`;
    sec.dishes.forEach(d => {
      const badgeHtml = d.badge
        ? `<span class="badge ${d.badge}">${d.badge === 'esp' ? 'Especialidad' : 'Novedad'}</span>`
        : '';
      const allergenHtml = d.allergens && d.allergens.length
        ? `<span class="dish-allergens">${d.allergens.map(a =>
            `<span title="${a}">${ALLERGEN_ICONS[a] || '\u26a0\ufe0f'}</span>`
          ).join('')}</span>`
        : '';
      html += `
        <div class="dish">
          <span class="dish-name">
            ${d.name} ${badgeHtml} ${allergenHtml}
            <span class="dish-desc">${d.desc}</span>
          </span>
        </div>`;
    });
    sectionEl.innerHTML = html;
    menuEl.appendChild(sectionEl);
  });

  /* Footer — SIN DISCLAIMER DE PRECIOS */
  const footerEl = document.getElementById('footer-container');
  footerEl.innerHTML = `
    <div class="allergen-legend info-highlight">
      <span style="font-size:.75rem">\ud83e\udd90 \ud83c\udf3e</span> = contiene al\u00e9rgeno
    </div>
    <div class="footer-divider"></div>
    <div class="info-grid">
      <div class="info-item info-highlight">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Delivery a partir de ${C.info.minDelivery} comensales
      </div>
      <div class="info-item info-highlight">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Showcooking a partir de ${C.info.minShowcooking} comensales
      </div>
      <div class="info-item info-highlight">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${C.info.reservaTexto}
      </div>
      <div class="info-item info-highlight">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" rx="2" ry="2" width="22" height="16"/><circle cx="12" cy="12" r="4"/><line x1="1" y1="10" x2="4" y2="10"/><line x1="20" y1="10" x2="23" y2="10"/><line x1="1" y1="14" x2="4" y2="14"/><line x1="20" y1="14" x2="23" y2="14"/></svg>
        Precios seg\u00fan arroz y modalidad del evento. Cons\u00faltenos sin compromiso.
      </div>
    </div>
    <div class="order-cta">
      <a href="${waUrl}" target="_blank" aria-label="Haz tu pedido por WhatsApp">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" opacity=".8"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Haz tu pedido aqu\u00ed
      </a>
    </div>
    <div class="ig">
      <a href="${C.instagram.url}" target="_blank" aria-label="Instagram de HSP">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2"/></svg>
        ${C.instagram.handle}
      </a>
    </div>`;

  /* Floating CTA */
  document.getElementById('float-cta').href = waUrl;

  /* Keep float-cta visible on pinch-zoom (iOS) */
  if (window.visualViewport) {
    const cta = document.getElementById('float-cta');
    var size = 72, margin = 16;
    function repositionCta() {
      var vv = window.visualViewport;
      var s = 1 / vv.scale;
      var realSize = size * s;
      cta.style.bottom = 'auto';
      cta.style.right = 'auto';
      cta.style.top = (vv.offsetTop + vv.height - realSize - margin * s) + 'px';
      cta.style.left = (vv.offsetLeft + vv.width - realSize - margin * s) + 'px';
      cta.style.transform = 'scale(' + s + ')';
      cta.style.transformOrigin = 'top left';
    }
    visualViewport.addEventListener('resize', repositionCta);
    visualViewport.addEventListener('scroll', repositionCta);
  }
})();
</script>
